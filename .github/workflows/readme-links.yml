name: Verify README links

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday, 06:00 UTC
  workflow_dispatch: {}

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check every link in README.md resolves
        run: |
          set -e
          urls=$(grep -oE 'https?://[^)"[:space:]>]+' README.md | sort -u)
          fail=0
          for url in $urls; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 "$url" || echo "000")
            if [ "$code" -ge 400 ] || [ "$code" = "000" ]; then
              echo "::error::Broken link ($code): $url"
              fail=1
            else
              echo "OK ($code): $url"
            fi
          done
          exit $fail

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Broken link detected in README.md",
              body: "The weekly link-check workflow found at least one broken link. See the run log for details.",
              labels: ["maintenance"]
            });
