<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="g3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="320" fill="#0B0C11"/>
  <text x="40" y="44" font-family="Arial" font-size="16" font-weight="600" fill="#EDEDF2">FlowGate — request path</text>
  <text x="40" y="66" font-family="monospace" font-size="11" fill="#7D8195">client → gateway → service, with resilience at every hop</text>

  <!-- client -->
  <g transform="translate(90,180)">
    <rect x="-45" y="-20" width="90" height="40" rx="6" fill="#16171F" stroke="#2A2C3B"/>
    <text text-anchor="middle" y="5" font-family="monospace" font-size="11" fill="#C9CBD8">CLIENT</text>
  </g>

  <!-- gateway -->
  <g transform="translate(330,180)">
    <rect x="-70" y="-46" width="140" height="92" rx="8" fill="#151626" stroke="#8B5CF6" stroke-width="1.2"/>
    <text text-anchor="middle" y="-20" font-family="Arial" font-size="12" font-weight="600" fill="#EDEDF2">GATEWAY</text>
    <text text-anchor="middle" y="-2" font-family="monospace" font-size="9.5" fill="#8890A6">auth · rate limit</text>
    <text text-anchor="middle" y="12" font-family="monospace" font-size="9.5" fill="#8890A6">cache · LB</text>
    <text text-anchor="middle" y="26" font-family="monospace" font-size="9.5" fill="#8890A6">circuit breaker</text>
  </g>

  <!-- services -->
  <g font-family="monospace" font-size="10.5" fill="#8890A6" text-anchor="middle">
    <g transform="translate(620,70)">
      <rect x="-55" y="-18" width="110" height="36" rx="6" fill="#16171F" stroke="#22D3EE" stroke-width="1"/>
      <text y="5" fill="#C9CBD8">USERS ×3</text>
    </g>
    <g transform="translate(620,150)">
      <rect x="-55" y="-18" width="110" height="36" rx="6" fill="#16171F" stroke="#22D3EE" stroke-width="1"/>
      <text y="5" fill="#C9CBD8">PAYMENTS</text>
    </g>
    <g transform="translate(620,230)">
      <rect x="-55" y="-18" width="110" height="36" rx="6" fill="#16171F" stroke="#22D3EE" stroke-width="1"/>
      <text y="5" fill="#C9CBD8">NOTIFY</text>
    </g>
    <g transform="translate(620,290)">
      <rect x="-55" y="-16" width="110" height="32" rx="6" fill="#16171F" stroke="#22D3EE" stroke-width="1"/>
      <text y="5" fill="#C9CBD8">AUTH SVC</text>
    </g>
  </g>

  <!-- observability sink -->
  <g transform="translate(1040,180)">
    <rect x="-75" y="-40" width="150" height="80" rx="8" fill="#151626" stroke="#22D3EE" stroke-width="1.1"/>
    <text text-anchor="middle" y="-14" font-family="Arial" font-size="12" font-weight="600" fill="#EDEDF2">OBSERVABILITY</text>
    <text text-anchor="middle" y="4" font-family="monospace" font-size="9.5" fill="#8890A6">Prometheus → Grafana</text>
    <text text-anchor="middle" y="18" font-family="monospace" font-size="9.5" fill="#8890A6">OTel → Jaeger</text>
  </g>

  <!-- paths -->
  <path id="fp1" d="M 135,180 L 260,180" stroke="#2A2C3B" fill="none"/>
  <path id="fp2" d="M 400,180 C 480,180 500,70 565,70" stroke="#2A2C3B" fill="none"/>
  <path id="fp3" d="M 400,180 C 480,180 500,150 565,150" stroke="#2A2C3B" fill="none"/>
  <path id="fp4" d="M 400,180 C 480,180 500,230 565,230" stroke="#2A2C3B" fill="none"/>
  <path id="fp5" d="M 400,180 C 480,180 500,290 565,290" stroke="#2A2C3B" fill="none"/>
  <path id="fp6" d="M 400,145 C 700,60 850,180 965,180" stroke="#25273A" stroke-dasharray="2 4" fill="none"/>

  <circle r="3.2" fill="#22D3EE" filter="url(#g3)"><animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#fp1"/></animateMotion></circle>
  <circle r="3.2" fill="#8B5CF6" filter="url(#g3)"><animateMotion dur="2.1s" repeatCount="indefinite"><mpath href="#fp2"/></animateMotion></circle>
  <circle r="3.2" fill="#8B5CF6" filter="url(#g3)"><animateMotion dur="2.3s" begin="0.5s" repeatCount="indefinite"><mpath href="#fp3"/></animateMotion></circle>
  <circle r="3.2" fill="#8B5CF6" filter="url(#g3)"><animateMotion dur="2.5s" begin="1s" repeatCount="indefinite"><mpath href="#fp4"/></animateMotion></circle>
  <circle r="3.2" fill="#8B5CF6" filter="url(#g3)"><animateMotion dur="2.2s" begin="0.3s" repeatCount="indefinite"><mpath href="#fp5"/></animateMotion></circle>
  <circle r="2.6" fill="#22D3EE" opacity="0.8"><animateMotion dur="3s" repeatCount="indefinite"><mpath href="#fp6"/></animateMotion></circle>
</svg>
